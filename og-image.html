<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
@font-face { font-family:'PP Watch'; src:url('fonts/PPWatch-Black.otf') format('opentype'); font-weight:900; }
@font-face { font-family:'PP Watch'; src:url('fonts/PPWatch-Bold.otf') format('opentype'); font-weight:700; }
@font-face { font-family:'PP Pangram Sans'; src:url('fonts/PPPangramSans-Medium.otf') format('opentype'); font-weight:500; }
@font-face { font-family:'PP Pangram Sans'; src:url('fonts/PPPangramSans-Bold.otf') format('opentype'); font-weight:700; }
*{ margin:0; box-sizing:border-box; }
body{ width:1200px; height:630px; background:#0E0E10; overflow:hidden; position:relative;
  font-family:'PP Pangram Sans',sans-serif; color:#F4F3F1;
  display:flex; align-items:center; justify-content:center; }

/* deco frame */
.frame{ position:absolute; inset:28px; border:1px solid rgba(255,255,255,.18); }
.frame .in{ position:absolute; inset:10px; border:1px solid rgba(255,255,255,.07); }
.dc{ position:absolute; width:72px; height:72px; }
.dc svg{ width:100%; height:100%; display:block; }
.dc.tl{ top:-1px; left:-1px; } .dc.tr{ top:-1px; right:-1px; transform:scaleX(-1); }
.dc.br{ bottom:-1px; right:-1px; transform:scale(-1,-1); } .dc.bl{ bottom:-1px; left:-1px; transform:scaleY(-1); }
.dd{ position:absolute; left:50%; width:12px; height:12px; margin-left:-6px; background:#E81E25; transform:rotate(45deg); }
.dd.t{ top:-6.5px; } .dd.b{ bottom:-6.5px; }

.content{ position:relative; text-align:center; padding:0 90px; }
.kicker{ font-weight:700; font-size:24px; letter-spacing:.18em; text-transform:uppercase; color:#E81E25; }
.kicker::before, .kicker::after{ content:''; display:inline-block; width:10px; height:10px; background:#E81E25;
  transform:rotate(45deg); margin:0 18px; vertical-align:3px; }
h1{ font-family:'PP Watch',sans-serif; font-weight:900; font-size:118px; line-height:1.02;
  letter-spacing:-0.015em; color:#fff; margin-top:26px; white-space:nowrap; }
.sub{ font-weight:500; font-size:30px; line-height:1.4; color:#C9CCD2; margin-top:34px; }
.chips{ margin-top:34px; display:flex; gap:14px; justify-content:center; }
.chip{ font-weight:700; font-size:22px; padding:12px 26px; border-radius:999px;
  border:1.5px solid rgba(255,255,255,.35); }
.chip.red{ background:#E81E25; border-color:#E81E25; color:#fff; }
</style>
</head>
<body>
  <div class="frame"><span class="in"></span>
    <span class="dc tl"><svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 1 L14 14 L1 14" stroke="rgba(255,255,255,0.4)" stroke-width="1"/><path d="M26 1 L26 26 L1 26" stroke="rgba(255,255,255,0.22)" stroke-width="1"/><path d="M38 1 L38 38 L1 38" stroke="rgba(255,255,255,0.11)" stroke-width="1"/><rect x="4.5" y="4.5" width="5" height="5" fill="#E81E25"/></svg></span>
    <span class="dc tr"><svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 1 L14 14 L1 14" stroke="rgba(255,255,255,0.4)" stroke-width="1"/><path d="M26 1 L26 26 L1 26" stroke="rgba(255,255,255,0.22)" stroke-width="1"/><path d="M38 1 L38 38 L1 38" stroke="rgba(255,255,255,0.11)" stroke-width="1"/><rect x="4.5" y="4.5" width="5" height="5" fill="#E81E25"/></svg></span>
    <span class="dc br"><svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 1 L14 14 L1 14" stroke="rgba(255,255,255,0.4)" stroke-width="1"/><path d="M26 1 L26 26 L1 26" stroke="rgba(255,255,255,0.22)" stroke-width="1"/><path d="M38 1 L38 38 L1 38" stroke="rgba(255,255,255,0.11)" stroke-width="1"/><rect x="4.5" y="4.5" width="5" height="5" fill="#E81E25"/></svg></span>
    <span class="dc bl"><svg viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M14 1 L14 14 L1 14" stroke="rgba(255,255,255,0.4)" stroke-width="1"/><path d="M26 1 L26 26 L1 26" stroke="rgba(255,255,255,0.22)" stroke-width="1"/><path d="M38 1 L38 38 L1 38" stroke="rgba(255,255,255,0.11)" stroke-width="1"/><rect x="4.5" y="4.5" width="5" height="5" fill="#E81E25"/></svg></span>
    <span class="dd t"></span><span class="dd b"></span>
  </div>
  <div class="content">
    <div class="kicker">The Platform · Eric Lombardi for Ontario</div>
    <h1>Ontario Can<br>Still Win.</h1>
  </div>
</body>
</html>
